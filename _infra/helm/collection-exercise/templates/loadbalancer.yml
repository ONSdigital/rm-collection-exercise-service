{{ if .Values.loadBalancer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: collection-exercise-lb
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
    networking.gke.io/load-balancer-ip-addresses: {{ .Values.loadBalancer.ipAddressName }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: collection-exercise
  ports:
    - name: tcp-port
      protocol: TCP
      port: 80
      targetPort: 8080
{{ end }}
